name: Skill Safety

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-skill-package:
    name: Validate Hermes skill package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: python -m pip install --upgrade pip PyYAML rich

      - name: Check out Hermes Agent scanner
        uses: actions/checkout@v6
        with:
          repository: NousResearch/hermes-agent
          # Pin the scanner to a reviewed commit; bump deliberately. Unpinned
          # HEAD means upstream pushes run unreviewed code in this repo's CI.
          # Update with: git ls-remote https://github.com/NousResearch/hermes-agent HEAD
          ref: 24f74eb88853162899fe345dc34a9c5a20f66657
          path: .ci/hermes-agent

      - name: Run package validator and Hermes skill scanner
        env:
          HERMES_AGENT_SOURCE: ${{ github.workspace }}/.ci/hermes-agent
          PRIVATE_SCRUB_PATTERNS: ${{ secrets.PRIVATE_SCRUB_PATTERNS }}
        run: python scripts/validate_skill_repo.py

  gitleaks:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.24.3"
          # sha256 of gitleaks_8.24.3_linux_x64.tar.gz from the official release checksums.txt
          GITLEAKS_SHA256: "9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tgz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks over reachable history
        run: gitleaks detect --source . --redact --verbose --exit-code 2 --log-opts="--all"
